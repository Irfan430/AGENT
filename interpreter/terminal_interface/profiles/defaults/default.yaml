### AGENT CONFIGURATION FILE (DeepSeek Default)

# LLM Settings
llm:
  model: "deepseek/deepseek-chat"
  api_base: "https://api.deepseek.com/v1"
  temperature: 0.7
  context_window: 64000
  max_tokens: 4096
  supports_functions: true

# Computer Settings
computer:
  import_computer_api: True

# General Configuration
auto_run: True
offline: False
verbose: False

# AGENT Identification
display_message: "> AGENT is ready. Using DeepSeek as the default LLM.\n"
